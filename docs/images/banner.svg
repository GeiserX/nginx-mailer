<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43A047"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="white" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Envelope with nginx arrow icon -->
  <g transform="translate(40, 55)">
    <!-- Envelope body -->
    <rect x="5" y="20" width="80" height="55" rx="6" fill="white" opacity="0.15"/>
    <!-- Envelope flap -->
    <polygon points="5,20 45,52 85,20" fill="white" opacity="0.25" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Nginx-style arrow -->
    <g transform="translate(55, 40)" fill="url(#accent)">
      <polygon points="0,-12 20,0 0,12" opacity="0.9"/>
      <rect x="-18" y="-4" width="20" height="8" rx="2" opacity="0.9"/>
    </g>
    <!-- Mail lines -->
    <line x1="18" y1="45" x2="42" y2="45" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="18" y1="52" x2="50" y2="52" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="18" y1="59" x2="36" y2="59" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="bold" fill="white">nginx-mailer</text>

  <!-- Subtitle -->
  <text x="200" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="white" opacity="0.7">Lightweight Docker image with built-in contact form API</text>

  <!-- Decorative elements on the right -->
  <g transform="translate(720, 30)" opacity="0.1" fill="white">
    <!-- Floating envelope shapes -->
    <rect x="0" y="20" width="30" height="22" rx="3"/>
    <polygon points="0,20 15,34 30,20"/>
    <rect x="60" y="50" width="24" height="18" rx="3"/>
    <polygon points="60,50 72,60 84,50"/>
    <rect x="100" y="10" width="28" height="20" rx="3"/>
    <polygon points="100,10 114,24 128,10"/>
  </g>

  <!-- Server rack decorative -->
  <g transform="translate(780, 110)" opacity="0.12" fill="white">
    <rect x="0" y="0" width="60" height="16" rx="3"/>
    <rect x="0" y="20" width="60" height="16" rx="3"/>
    <rect x="0" y="40" width="60" height="16" rx="3"/>
    <circle cx="50" cy="8" r="3" fill="#4CAF50" opacity="0.6"/>
    <circle cx="50" cy="28" r="3" fill="#4CAF50" opacity="0.6"/>
    <circle cx="50" cy="48" r="3" fill="#4CAF50" opacity="0.6"/>
  </g>
</svg>
